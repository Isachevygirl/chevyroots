name: Takedown Processor (Hourly)

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process takedowns
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
        run: |
          cd pipelines
          python takedown_processor.py

      - name: Commit removals
        run: |
          git config user.name "chevyroots-bot"
          git config user.email "bot@chevyroots.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "takedown: honor removal request $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
